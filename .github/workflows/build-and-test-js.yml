name: Build and Test JS

on:
  push:
    paths-ignore:
      - "*.md"
  pull_request:

jobs:
  js-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run JS test suite
        run: npm test
